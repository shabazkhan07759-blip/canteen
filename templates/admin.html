<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body>

<h2>📊 All Orders</h2>

<table border="1">
<tr>
    <th>Order No</th>
    <th>Name</th>
    <th>Item</th>
    <th>Qty</th>
    <th>Total</th>
</tr>

{% for order in orders %}
<tr>
    <td>{{ order.order_no }}</td>
    <td>{{ order.name }}</td>
    <td>{{ order.item }}</td>
    <td>{{ order.qty }}</td>
    <td>₹{{ order.total }}</td>
</tr>
{% endfor %}

</table>

<a href="/">Back</a>

</body>
</html>
